name: Decompress 7z File

on:
  push:
    branches: [ main ]
    paths:
      - '**.7z'

jobs:
  decompress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install 7zip
        run: sudo apt-get install -y p7zip-full
      
      - name: Decompress 7z file
        run: |
          # Encontra o arquivo .7z
          for file in $(find . -name "*.7z" -type f); do
            echo "Descompactando: $file"
            dir_name=$(dirname "$file")
            7z x "$file" -o"$dir_name/"
          done
      
      - name: Remove 7z file
        run: find . -name "*.7z" -type f -delete
      
      - name: Commit decompressed file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Decompress 7z file" || echo "No changes to commit"
          git push
