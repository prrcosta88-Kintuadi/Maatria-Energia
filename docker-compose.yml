# docker-compose.yml
version: '3.8'

services:
  kintuadi:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data  # Mapeia a pasta data para persistência
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    restart: unless-stopped